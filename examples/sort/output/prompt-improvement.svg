<text x="814.0" y="844.0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#334155">like `(record[&quot;age&quot;], -record[&quot;score&quot;],</text>
<text x="814.0" y="862.0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#334155">record[&quot;name&quot;], record)`.</text>
