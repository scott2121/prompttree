<text x="814.0" y="772.0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#334155">Use a decorate-sort-undecorate strategy</text>
<text x="814.0" y="790.0" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#334155">instead of multiple stable sort passes.</text>
